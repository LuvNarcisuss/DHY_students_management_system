<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程作业</title>
    <link rel="icon" href="/static/images/男神.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/assignments.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>课程作业管理</h2>
        <a href="{{ url_for('assignments.teacher_assign_homework', course_id=course_id) }}" class="btn btn-primary mb-3">发布新作业</a>

        <div class="list-group">
            {% for assignment in assignments %}
            <div class="list-group-item mb-2 assignment-item">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h5>{{ assignment.title }}</h5>
                        <p class="mb-1">{{ assignment.description }}</p>
                        <small class="text-muted">截止日期: {{ assignment.due_date.strftime('%Y-%m-%d %H:%M') }}</small>
                    </div>
                    <div class="text-end">
                        <span class="badge bg-info text-dark">{{ assignment.submission_count }} 提交</span>
                        <a href="{{ url_for('assignments.teacher_view_submissions', assignment_id=assignment.id) }}" class="btn btn-sm btn-primary mt-1">查看提交</a>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="alert alert-info">暂无作业</div>
            {% endfor %}
        </div>
        <div>
            <a href="{{ url_for('courses.teacher_my_courses') }}" class="btn btn-outline-secondary">返回课程列表</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
