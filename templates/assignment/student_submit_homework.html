<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交作业</title>
    <link rel="icon" href="/static/images/男神.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/assignments.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>{{ assignment.course_name }} - {{ assignment.title }}</h2>
        <p>{{ assignment.description }}</p>
        <p class="text-danger">截止日期: {{ assignment.due_date.strftime('%Y-%m-%d %H:%M') }}</p>

        <form method="POST" enctype="multipart/form-data" class="mb-4">
            <div class="mb-3">
                <label for="submission_text" class="form-label">作业内容</label>
                <textarea class="form-control" id="submission_text" name="submission_text" rows="10">{{ submission.submission_text if submission else '' }}</textarea>
            </div>
            <div class="mb-3">
                <label for="attachment" class="form-label">附件上传</label>
                <input type="file" class="form-control" id="attachment" name="attachment">
                {% if submission and submission.attachment_path %}
                <div class="mt-2">
                    <span class="text-muted">已上传附件: </span>
                    <a href="{{ url_for('assignments.download_submission', submission_id=submission.id) }}" class="btn btn-sm btn-outline-primary">
                        下载附件
                    </a>
                </div>
                {% endif %}
            </div>
            <button type="submit" class="btn btn-primary">提交作业</button>
            <a href="{{ url_for('assignments.student_view_assignments') }}" class="btn btn-secondary">返回</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
