<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <title>学生管理系统登陆</title>
    <link rel="icon" href="../../static/images/男神.ico">
    <style>
        /* 原有样式保持不变 */
        li {
            list-style: none;
        }

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-image: url(../../static/images/背景.jpg);
            background-repeat: no-repeat;
            background-size: 100% auto;
        }

        #maxbox {
            margin: 0 auto;
            margin-top: 200px;
            padding: 20px 50px;
            background-color: #00000090;
            text-align: center;
            width: 600px;
            height: 400px;
            border-radius: 10px;
            position: relative; /* 添加相对定位 */
        }

        #maxbox h1 {
            padding: 0;
            padding-top: 60px;
            color: white;
            font-size: 30px;
            padding-bottom: 4px;
            border-bottom: solid 1px white;
        }

        #maxbox h2 {
            font-weight: 700;
            color: white;
        }

        #maxbox .inputbox {
            margin-top: 30px;
        }

        #maxbox .inputText {
            margin-top: 20px;
        }

        #maxbox .inputText span {
            color: white;
            font-size: 18px;
        }

        #maxbox .inputText input {
            border: 0;
            padding: 6px;
            border-bottom: 1px solid white;
            background-color: #FFFFFF00;
            color: white;
        }

        #maxbox .inputbox .inputButton {
            margin: 0;
            border: 0;
            margin-top: 20px;
            width: 145px;
            height: 25px;
            border-radius: 25px;
            color: white;
            background-color: #3498db;
        }

        #sign_up {
            margin-top: 50px;
            color: white;
            font-size: 17px;
        }

        #sign_up a {
            color: #3498db;
        }

        .role-select {
            margin-top: 20px;
            color: white;
        }

        .role-select label {
            margin-right: 15px;
        }

        /* 注册按钮 */
        .register-button {
            position: absolute; /* 绝对定位 */
            top: 10px; /* 距离顶部10px */
            right: 10px; /* 距离左侧10px */
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            text-decoration: none; /* 去掉下划线 */
            font-size: 14px;
        }

        .register-button:hover {
            background-color: #dddddd; /* 鼠标悬停时颜色变深 */
        }
    </style>
</head>

<body>
    <div id="maxbox">
        <a class="register-button" href="{{ url_for('login.register') }}">注册</a>

        <h1>学生管理系统</h1>
        <h2>请登录</h2>
        <div class="inputbox">
            <form method="POST" action="{{ url_for('login.login') }}">
                <div class="inputText">
                    <span class="iconfont icon-mine"></span>
                    <input type="text" placeholder="用户名" name="username" required style="color: white">
                </div>
                <div class="inputText">
                    <span class="iconfont icon-lock"></span>
                    <input type="password" placeholder="密码" name="password" required style="color: white">
                </div>
                <div class="role-select">
                    <label>
                        <input type="radio" name="role" value="student" required checked> 学生
                    </label>
                    <label>
                        <input type="radio" name="role" value="teacher"> 老师
                    </label>
                    <label>
                        <input type="radio" name="role" value="admin"> 管理员
                    </label>
                </div>
                <input class="inputButton" type="submit" value="登录">
            </form>
            {% if error %}
                <div style="color: white; margin-top: 20px;">{{ error }}</div>
            {% endif %}
        </div>
    </div>
</body>
</html>
