<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册</title>
    <link rel="icon" href="/static/images/男神.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>注册</h1>
    <form method="POST" action="{{ url_for('login.register') }}">
        <label for="username">姓名:</label>
        <input type="text" id="username" name="username" required><br><br>

        <label for="gender">性别:</label>
        <input type="text" id="gender" name="gender" required><br><br>

        <label for="birthdate">出生年月:</label>
        <input type="text" id="birthdate" name="birthdate" required><br><br>

        <label for="phone">电话:</label>
        <input type="text" id="phone" name="phone" required><br><br>

        <label for="email">邮箱:</label>
        <input type="text" id="email" name="email" required><br><br>

        <label for="password">密码:</label>
        <input type="password" id="password" name="password" required><br><br>

        <button type="submit">注册</button>
    </form>
    <br>
    <a href="{{ url_for('login.login') }}">返回登录</a>
</body>
</html>
