<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的课程</title>
    <link rel="icon" href="/static/images/男神.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
            background-color: #f8f9fa;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h1 {
            color: #007bff;
            margin: 0;
        }
        .btn-export {
            background-color: #28a745;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
        }
        .btn-export:hover {
            background-color: #218838;
            color: white;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .table th, .table td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }
        .table th {
            background-color: #007bff;
            color: white;
            font-weight: bold;
        }
        .table tbody tr:nth-child(odd) {
            background-color: #f9f9f9;
        }
        .table tbody tr:hover {
            background-color: #f1f1f1;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #007bff;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>我的课程</h1>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>课程名称</th>
                <th>学分</th>
                <th>课程类型</th>
                <th>平时成绩(40%)</th>
                <th>期末成绩(60%)</th>
                <th>综合成绩</th>
                <th>绩点</th>
            </tr>
        </thead>
        <tbody>
            {% for course in courses %}
            <tr>
                <td>{{ course.course_name }}</td>
                <td>{{ course.credit }}</td>
                <td>{{ course.course_type }}</td>
                <td>{{ course.usual_score }}</td>
                <td>{{ course.final_score }}</td>
                <td>{{ course.score }}</td>
                <td>{{ course.gpa }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <div class="header-container">
        <a href="{{ url_for('courses.export_courses') }}" class="btn-export">
            导出Excel成绩单
        </a>
    </div>
</body>
</html>
