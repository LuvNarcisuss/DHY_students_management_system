<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程学生管理</title>
    <link rel="icon" href="/static/images/男神.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            padding: 20px;
            background-color: #f8f9fa;
        }
        h1 {
            color: #007bff;
            margin-bottom: 20px;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .table th, .table td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }
        .table th {
            background-color: #007bff;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .table th:hover {
            background-color: #0069d9;
        }
        .table tbody tr:nth-child(odd) {
            background-color: #f9f9f9;
        }
        .table tbody tr:hover {
            background-color: #f1f1f1;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #007bff;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .form-control {
            width: 80px;
            margin: 0 auto;
            text-align: center;
        }
        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }
        .sort-icon {
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <h1>课程学生管理</h1>
    <table class="table">
        <thead>
            <tr>
                <th onclick="sortStudents('user_id')">学号 <span id="user_id_sort" class="sort-icon"></span></th>
                <th>姓名</th>
                <th onclick="sortStudents('usual_score')">平时成绩(40%) <span id="usual_score_sort" class="sort-icon"></span></th>
                <th onclick="sortStudents('final_score')">期末成绩(60%) <span id="final_score_sort" class="sort-icon"></span></th>
                <th onclick="sortStudents('total_score')">综合成绩 <span id="total_score_sort" class="sort-icon"></span></th>
                <th onclick="sortStudents('gpa')">绩点 <span id="gpa_sort" class="sort-icon"></span></th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="studentsTableBody">
            {% for student in students %}
            <tr>
                <td>{{ student.user_id }}</td>
                <td>{{ student.student_name }}</td>
                <td>
                    <input type="number" class="form-control usual-score"
                           value="{{ student.usual_score if student.usual_score else 0 }}"
                           min="0" max="100" data-id="{{ student.id }}">
                </td>
                <td>
                    <input type="number" class="form-control final-score"
                           value="{{ student.final_score if student.final_score else 0 }}"
                           min="0" max="100" data-id="{{ student.id }}">
                </td>
                <td class="total-score">
                    {{ student.total_score|round(1) if student.total_score else 0 }}
                </td>
                <td class="gpa">
                    {{ student.gpa|round(1) if student.gpa else 0 }}
                </td>
                <td>
                    <button class="btn btn-primary btn-sm save-score"
                            data-id="{{ student.id }}">保存</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="{{ url_for('courses.teacher_my_courses') }}" class="back-link">返回课程列表</a>

    <script>
    $(document).ready(function() {
        $('.save-score').click(function() {
            const recordId = $(this).data('id');
            const usualScore = $(this).closest('tr').find('.usual-score').val();
            const finalScore = $(this).closest('tr').find('.final-score').val();

            $.ajax({
                url: "{{ url_for('courses.teacher_update_scores') }}",
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify({
                    record_id: recordId,
                    usual_score: usualScore,
                    final_score: finalScore
                }),
                success: function(response) {
                    if (response.success) {
                        const row = $(`button[data-id="${recordId}"]`).closest('tr');
                        row.find('.total-score').text(response.total_score.toFixed(1));
                        row.find('.gpa').text(response.gpa.toFixed(1));
                        alert('成绩更新成功');
                    } else {
                        alert('更新失败: ' + response.message);
                    }
                },
                error: function() {
                    alert('请求失败，请稍后重试');
                }
            });
        });
    });

    function sortStudents(sortBy) {
        const courseId = {{ course_id }};
        const currentUrl = new URL(window.location.href);
        const currentSort = currentUrl.searchParams.get('sort');
        const currentOrder = currentUrl.searchParams.get('order');

        // 确定新排序顺序：如果点击的是同一列，则切换顺序；否则默认升序
        let newOrder = 'asc';
        if (currentSort === sortBy) {
            newOrder = currentOrder === 'asc' ? 'desc' : 'asc';
        }

        // 更新浏览器URL（不刷新页面）
        history.pushState({}, '', `?sort=${sortBy}&order=${newOrder}`);

        // 更新排序图标
        $('.sort-icon').html('');
        const icon = newOrder === 'asc' ? '↑' : '↓';
        $(`#${sortBy}_sort`).html(icon);

        // 加载排序后的数据
        $.ajax({
            url: "{{ url_for('courses.teacher_course_students', course_id=0) }}".replace('0', courseId),
            method: "GET",
            data: {
                sort: sortBy,
                order: newOrder
            },
            success: function(response) {
                const newHtml = $(response).find('#studentsTableBody').html();
                $('#studentsTableBody').html(newHtml);
                // 重新绑定事件处理程序
                $('.save-score').off('click').on('click', saveScoreHandler);
            },
            error: function() {
                alert('排序请求失败，请稍后重试');
            }
        });
    }

    function saveScoreHandler() {
        const recordId = $(this).data('id');
        const usualScore = $(this).closest('tr').find('.usual-score').val();
        const finalScore = $(this).closest('tr').find('.final-score').val();

        $.ajax({
            url: "{{ url_for('courses.teacher_update_scores') }}",
            method: "POST",
            contentType: "application/json",
            data: JSON.stringify({
                record_id: recordId,
                usual_score: usualScore,
                final_score: finalScore
            }),
            success: function(response) {
                if (response.success) {
                    const row = $(`button[data-id="${recordId}"]`).closest('tr');
                    row.find('.total-score').text(response.total_score.toFixed(1));
                    row.find('.gpa').text(response.gpa.toFixed(1));
                    alert('成绩更新成功');
                } else {
                    alert('更新失败: ' + response.message);
                }
            },
            error: function() {
                alert('请求失败，请稍后重试');
            }
        });
    }

    // Initialize sort icons based on current URL
    $(document).ready(function() {
        const currentUrl = new URL(window.location.href);
        const currentSort = currentUrl.searchParams.get('sort');
        const currentOrder = currentUrl.searchParams.get('order');

        if (currentSort) {
            const icon = currentOrder === 'asc' ? '↑' : '↓';
            $(`#${currentSort}_sort`).html(icon);
        }
    });
    </script>
</body>
</html>
