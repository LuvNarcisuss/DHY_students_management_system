<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程申请</title>
    <link rel="icon" href="/static/images/男神.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/apply.css" rel="stylesheet">
</head>
<body>
    <div class="container apply-container">
        <h2 class="apply-title"><i class="bi bi-book-plus"></i> 课程申请</h2>

        <!-- 教师信息展示 -->
        <div class="user-info-card row">
            <div class="col-md-6">
                <span class="info-label">工号：</span>
                <span>{{ session['user_id'] }}</span>
            </div>
            <div class="col-md-6">
                <span class="info-label">姓名：</span>
                <span>{{ session['username'] }}</span>
            </div>
        </div>

        <!-- 课程申请表单 -->
        <form method="POST">
            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <div class="mb-3">
                <label for="course_name" class="form-label">课程名称</label>
                <input type="text" class="form-control" id="course_name" name="course_name" required>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="credit" class="form-label">学分</label>
                    <input type="number" class="form-control" id="credit" name="credit" step="0.5" min="0.5" max="10" required>
                </div>
                <div class="col-md-6">
                    <label for="capacity" class="form-label">课程容量</label>
                    <input type="number" class="form-control" id="capacity" name="capacity" min="1" max="200" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="department" class="form-label">开设院系</label>
                <input type="text" class="form-control" id="department" name="department" required>
            </div>

            <div class="mb-3">
                <label for="textbook" class="form-label">教材</label>
                <input type="text" class="form-control" id="textbook" name="textbook" required>
            </div>

            <div class="mb-3">
                <label for="course_type" class="form-label">课程类型</label>
                <select class="form-select" id="course_type" name="course_type" required>
                    <option value="必修">必修</option>
                    <option value="选修">选修</option>
                </select>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <button type="submit" class="btn btn-primary btn-submit">
                    <i class="bi bi-send"></i> 提交申请
                </button>
                <a href="{{ url_for('apply.teacher_course_status') }}" class="btn btn-secondary btn-back">
                    <i class="bi bi-arrow-left"></i> 返回申请
                </a>
            </div>
        </form>
    </div>
</body>
</html>
