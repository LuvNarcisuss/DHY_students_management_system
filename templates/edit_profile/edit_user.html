<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改学生信息</title>
    <link rel="icon" href="/static/images/男神.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 15px;
            background-color: #f8f9fa;
        }
        h2 {
            color: #007bff;
            margin-bottom: 20px;
        }
        .form-control {
            margin-bottom: 15px;
        }
        .btn {
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>修改学生信息</h2>
        <form method="POST" action="{{ url_for('users.edit_user', user_id=user.id) }}">
            <div class="mb-3">
                <label for="username" class="form-label">姓名</label>
                <input type="text" class="form-control" id="username" name="username" value="{{ user.username }}" required>
            </div>
            <div class="mb-3">
                <label for="gender" class="form-label">性别</label>
                <input type="text" class="form-control" id="gender" name="gender" value="{{ user.gender }}" required>
            </div>
            <div class="mb-3">
                <label for="birthdate" class="form-label">出生年月</label>
                <input type="text" class="form-control" id="birthdate" name="birthdate" value="{{ user.birthdate }}" required>
            </div>
            <div class="mb-3">
                <label for="department" class="form-label">院系</label>
                <input type="text" class="form-control" id="department" name="department" value="{{ user.department }}" required>
            </div>
            <div class="mb-3">
                <label for="major" class="form-label">专业</label>
                <input type="text" class="form-control" id="major" name="major" value="{{ user.major }}" required>
            </div>
            <div class="mb-3">
                <label for="grade" class="form-label">年级</label>
                <input type="text" class="form-control" id="grade" name="grade" value="{{ user.grade }}" required>
            </div>
            <div class="mb-3">
                <label for="classname" class="form-label">班级</label>
                <input type="text" class="form-control" id="classname" name="classname" value="{{ user.classname }}" required>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">电话</label>
                <input type="tel" class="form-control" id="phone" name="phone" value="{{ user.phone }}" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">邮箱</label>
                <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
            </div>
            <div class="d-grid gap-2 d-md-block">
                <button type="submit" class="btn btn-primary">更新学生信息</button>
                <a href="{{ url_for('users.view_users') }}" class="btn btn-secondary">返回学生列表</a>
            </div>
        </form>
    </div>
</body>
</html>
